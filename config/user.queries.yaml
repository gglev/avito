# main request
query: |
  Дорогие издания, подарочные издания
  Книги в отличном состоянии
  Книги из домашней библиотеки
  Книги на подарок
  Коллекционные и редкие издания

# publisher
publishers:
  priority:
    - "Слово"
    - "Slovo"
    - "Вита Нова"
    - "Vita Nova"
    - "Vita nova"
    - "v-a-c press"
    - "Ad Marginem"
    - "ad marginem"
    - "Шум"
    - "Strelka Press"
    - "Стрелка"
    - "Азбука"
    - "Азбука-классика"

# seriya
series:
  priority:
    - "Великие музеи мира"
    - "Великие дворцы мира"
    - "Малая библиотека шедевров"
    - "Художник и знаток"

# authors
books:
  # Умберто Эко
  - author: "Умберто Эко"
    titles:
      - "История красоты"
      - "История уродства"
      - "Имя розы"
      - "Вертиго"
      - "Vertigo"
  
  # Уолтер Айзексон
  - author: "Уолтер Айзексон"
    titles:
      - "Инноваторы"
      - "Леонардо да Винчи"
  
  # Мураками
  - author: "Харуки Мураками"
    titles:
      - "Подземка"
      - "Край обетованный"
  
  # Донна Тартт
  - author: "Донна Тартт"
    titles:
      - "Щегол"
      - "Тайная история"
  
  # Отдельные книги
  - title: "Благоволительницы"
    author: "Джонатан Литтелл"
  
  - title: "Комментарий к роману Дар"
    author: "Долинин"
  
  - title: "О красоте"
    author: "Уолш"
  
  - title: "Камера. Негатив. Отпечаток"
    author: "Ансель Адамс"
  
  - title: "Дизайн. Всемирная история"
  
  - title: "Вспышка энергии"
    author: "Саймон Рейнольдс"
  
  - title: "Любовница Витгенштейна"
  
  - title: "Игорь Кон"  # вероятно автор

# key words
keywords:
  required:
    - "книга"
  
  preferred:
    # Типы изданий
    - "подарочное"
    - "подарочный"
    - "коллекционное"
    - "коллекционный"
    - "редкое"
    - "редкий"
    - "эксклюзивное"
    
    # Состояние
    - "отличное состояние"
    - "идеальное состояние"
    - "как новая"
    - "домашняя библиотека"
    
    # Издательства (дублируем для надежности)
    - "слово"
    - "slovo"
    - "вита нова"
    - "vita nova"
    - "v-a-c"
    - "ad marginem"
    - "стрелка"
    - "strelka"
    - "шум"
    - "азбука"
    
    # Серии
    - "великие музеи"
    - "великие дворцы"
    - "малая библиотека шедевров"
    
    # Авторы
    - "эко"
    - "айзексон"
    - "мураками"
    - "тартт"
    - "литтелл"
    - "рейнольдс"
    - "адамс"
    
    # Названия
    - "благоволительницы"
    - "инноваторы"
    - "леонардо"
    - "подземка"
    - "щегол"
    - "тайная история"
    - "история красоты"
    - "история уродства"
    - "имя розы"
    - "вертиго"
  
  excluded:
    - "pdf"
    - "электронная"
    - "аудиокнига"
    - "диск"
    - "dvd"
    - "репринт"
    - "самиздат"
    - "ксерокопия"

# authors for priority
authors:
  priority:
    - "Умберто Эко"
    - "Умберто Эко"
    - "Донна Тартт"
    - "Харуки Мураками"
    - "Уолтер Айзексон"
    - "Саймон Рейнольдс"
    - "Джонатан Литтелл"
    - "Ансель Адамс"
    - "Игорь Кон"
  
  exclude: []

# genres
genres:
  preferred:
    - "искусство"
    - "культурология"
    - "фотография"
    - "дизайн"
    - "архитектура"
    - "биография"
    - "мемуары"
    - "подарочное издание"
    - "коллекционное издание"
    - "художественная литература"
    - "современная проза"

# price
price:
  min: 100              # Минимальная цена (дешевле не интересно)
  max: 40000            # Максимальная цена (для дорогих изданий)
  ideal: 5000           # Идеальная цена
  allow_negotiable: true

# year
year:
  min: 1990
  max: 2026
  preferred_years: []     # Не важно

# condition
condition:
  excellent:
    - "отличное"
    - "идеальное"
    - "как новая"
    - "коллекционное"
    - "в идеале"
    - "не читали"
    - "почти новая"
  
  
  good:
    - "хорошее"
    - "очень хорошее"
  
  acceptable:
    - "удовлетворительное"
    - "читали"
    - "есть нюансы"
  
  bad:
    - "плохое"
    - "рваная"
    - "порвана"
    - "исписана"
    - "пятна"

# for photo analyze
visual_features:
  old_book:
    - "суперобложка"
    - "футляр"
    - "подарочная упаковка"
    - "иллюстрации"
    - "мелованная бумага"
    - "тканевый переплет"
    - "кожаный переплет"
    - "золотое тиснение"
  
  rare_features:
    - "дарственная надпись"
    - "автограф"
    - "номерной экземпляр"
    - "ограниченный тираж"
    - "нумерованный экземпляр"

# weight of criteries
weights:
  title_match: 0.30        # Название важно
  description_match: 0.15   # Описание
  author_match: 0.15        # Автор
  publisher_match: 0.15     # Издательство (важно для вас!)
  series_match: 0.10        # Серия
  year_match: 0.025          # Год
  price_match: 0.15         # Цена
  condition_match: 0.10     # Состояние

# ============================================
# ПОРОГИ СРАБАТЫВАНИЯ
# ============================================
thresholds:
  default: 0.60              # Обычный порог
  cheap_books: 0.50          # Для дешевых книг
  expensive_books: 0.70      # Для дорогих (>5000)
  rare_books: 0.40           # Для поиска редких

# ============================================
# ПОИСК НЕДООЦЕНЕННЫХ
# ============================================
undervalued_search:
  enabled: true
  look_for:
    library_stamps: false     # Библиотечные штампы не важны
    autographs: true          # Автографы важны
    inscriptions: true        # Дарственные надписи важны
    rare_editions: true       # Редкие издания важны
    first_editions: true      # Первые издания важны
  
  max_price: 40000            # Ищем дешевле 2000
  bonuses:
    for_autograph: 0.5        # +50% за автограф
    for_rare_edition: 0.4     # +40% за редкое
    for_first_edition: 0.3    # +30% за первое издание